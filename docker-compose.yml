# ═══════════════════════════════════════════════════════════════
# Docker Compose — Real-Time AI Stock Prediction Platform
# Full Stack: MongoDB + Redis + Backend + ML Service + Frontend
# ═══════════════════════════════════════════════════════════════

version: '3.9'

# ─── Named Volumes ─────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  ml_models:
    driver: local
  server_logs:
    driver: local

# ─── Custom Network ─────────────────────────────────────────────
networks:
  stock_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ═══════════════════════════════════════════════════════════════
services:

  # ─── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: stock_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-stockpass123}
      MONGO_INITDB_DATABASE: stock-prediction
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - stock_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Redis Cache ──────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: stock_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - stock_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node.js Backend Server ───────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stock_server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-stockpass123}@mongo:27017/stock-prediction?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_SERVICE_URL: http://ml-service:5001
    ports:
      - "5000:5000"
    volumes:
      - server_logs:/app/logs
    networks:
      - stock_net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Python ML Microservice ───────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: stock_ml
    restart: unless-stopped
    environment:
      PORT: 5001
      FLASK_ENV: production
    ports:
      - "5001:5001"
    volumes:
      - ml_models:/app/trained_models
    networks:
      - stock_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # ─── React Frontend (Nginx) ───────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_ML_URL: ${VITE_ML_URL:-http://localhost:5001}
    container_name: stock_client
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - stock_net
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
